name: Deploy DevQuest API to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "requirements.txt"
      - "startup.sh"
      - ".github/workflows/main_devquest.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies into App Service package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Create deployment package
        run: |
          zip -r devquest-api.zip apps requirements.txt startup.sh .python_packages

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E5DB199B154E45DE9AD4874321B22CCD }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4A7DE190D64C4241BC29A968EE399360 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4E131E73247E445F9E8E2C42DFF0EA2C }}

      - name: Configure Azure Web App startup
        run: |
          az webapp config appsettings set \
            --name devquest \
            --resource-group Virtual-Machine-website \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false PYTHONPATH=/home/site/wwwroot:/home/site/wwwroot/.python_packages/lib/site-packages WEBSITES_PORT=8000 PORT=8000 WEB_CONCURRENCY=2
          az webapp config set \
            --name devquest \
            --resource-group Virtual-Machine-website \
            --startup-file "bash startup.sh"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "devquest"
          slot-name: "Production"
          package: devquest-api.zip
