name: Deploy DevQuest API to Azure Web App

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "requirements.txt"
      - "startup.sh"
      - ".github/workflows/main_devquest.yml"
  workflow_dispatch:

concurrency:
  group: devquest-api-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          zip -r devquest-api.zip apps requirements.txt startup.sh

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E5DB199B154E45DE9AD4874321B22CCD }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4A7DE190D64C4241BC29A968EE399360 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4E131E73247E445F9E8E2C42DFF0EA2C }}

      - name: Configure Azure Web App startup
        run: |
          az webapp config appsettings delete \
            --name devquest \
            --resource-group devquest \
            --setting-names WEBSITE_RUN_FROM_PACKAGE || true
          az webapp config appsettings set \
            --name devquest \
            --resource-group devquest \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true ENABLE_ORYX_BUILD=true PYTHONPATH=/home/site/wwwroot:/home/site/wwwroot/.python_packages/lib/site-packages WEBSITES_PORT=8000 PORT=8000 WEB_CONCURRENCY=2
          az webapp config set \
            --name devquest \
            --resource-group devquest \
            --startup-file "bash /home/site/wwwroot/startup.sh"

      - name: Deploy to Azure Web App
        run: |
          az webapp deployment source config-zip \
            --name devquest \
            --resource-group devquest \
            --src devquest-api.zip
